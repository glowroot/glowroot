<!--
  average / percentiles / throughput switcher.
  Replaces the old overlapping radio row that collided with chart zoom/refresh controls.
-->
<div class="gt-response-time-view">
  <label class="gt-response-time-view-label" for="responseTimeViewSelect">View</label>
  <select id="responseTimeViewSelect"
          class="custom-select custom-select-sm gt-response-time-view-select"
          ng-model="$parent.responseTimeView"
          ng-change="$parent.changeResponseTimeView()"
          aria-label="Response time view">
    <option value="average">average</option>
    <option value="percentiles">percentiles</option>
    <option value="throughput">throughput</option>
  </select>
</div>
